name: Build and Deploy Miso App

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Nix
              uses: cachix/install-nix-action@v22
              with:
                  # Use a specific nixpkgs version that has working GHCJS
                  nix_path: nixpkgs=channel:nixos-22.11

            - name: Setup Cachix
              uses: cachix/cachix-action@v12
              with:
                  name: miso-haskell
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
                  skipPush: true

            - name: Create Nix build file
              run: |
                  cat > default.nix << 'NIXEND'
                  { pkgs ? import <nixpkgs> {} }:

                  let
                    # Use a specific working GHCJS version
                    haskellPackages = pkgs.haskell.packages.ghcjs;
                    
                    # Use miso from nixpkgs
                    
                  in haskellPackages.callCabal2nix "calApp" ./. {}
                  NIXEND

            - name: Build with Nix
              run: |
                  # Build without time limit and show all output to debug
                  echo "Starting Nix build (no timeout)..."
                  echo "=== Nix expression content ==="
                  cat default.nix
                  echo "=== Cabal file content ==="
                  cat calApp.cabal
                  echo "=== Starting build ==="
                  nix-build --keep-going || {
                    echo "Build failed, checking for any partial results..."
                    ls -la
                    exit 1
                  }
                  echo "=== Build completed, checking result ==="
                  if [ -L result ]; then
                    echo "Result symlink found:"
                    ls -la result
                    find result -type f | head -20
                  else
                    echo "No result symlink created - build may have failed silently"
                  fi

            - name: Copy build artifacts
              run: |
                  echo "=== Debugging: Looking for build output ==="
                  ls -la

                  # Check if nix-build created a result symlink
                  if [ -L "result" ]; then
                    echo "Found result symlink, exploring..."
                    ls -la result/
                    find result -name "*.jsexe" -o -name "*.js" | head -10
                  fi

                  # Also check for any .jsexe directories anywhere
                  echo "Searching for .jsexe directories..."
                  find . -name "*.jsexe" -type d 2>/dev/null | head -5

                  # Check if the cabal file was processed
                  echo "Checking for any JavaScript files..."
                  find . -name "*.js" 2>/dev/null | head -10

                  # Create output directory
                  mkdir -p dist

                  # Try to find JavaScript output in various locations
                  JSEXE_DIR=""
                  if [ -L "result" ]; then
                    JSEXE_DIR=$(find result -name "*.jsexe" -type d 2>/dev/null | head -1)
                  fi

                  if [ -z "$JSEXE_DIR" ]; then
                    JSEXE_DIR=$(find . -name "*.jsexe" -type d 2>/dev/null | head -1)
                  fi

                  echo "Found JSEXE directory: $JSEXE_DIR"

                  if [ -n "$JSEXE_DIR" ] && [ -d "$JSEXE_DIR" ]; then
                    echo "Contents of JSEXE directory:"
                    ls -la "$JSEXE_DIR"
                    
                    # Copy JavaScript files
                    if [ -f "$JSEXE_DIR/all.js" ]; then
                      cp "$JSEXE_DIR/all.js" dist/
                      printf '%s\n' \
                        '<!DOCTYPE html>' \
                        '<html>' \
                        '<head>' \
                        '    <meta charset="utf-8">' \
                        '    <title>CalApp</title>' \
                        '</head>' \
                        '<body>' \
                        '    <div id="app"></div>' \
                        '    <script src="all.js"></script>' \
                        '    <script>h$main(h$mainZCZCMainzimain);</script>' \
                        '</body>' \
                        '</html>' > dist/index.html
                    else
                      # Copy individual files
                      cp "$JSEXE_DIR"/*.js dist/ 2>/dev/null || true
                      printf '%s\n' \
                        '<!DOCTYPE html>' \
                        '<html>' \
                        '<head>' \
                        '    <meta charset="utf-8">' \
                        '    <title>CalApp</title>' \
                        '</head>' \
                        '<body>' \
                        '    <div id="app"></div>' \
                        '    <script src="rts.js"></script>' \
                        '    <script src="lib.js"></script>' \
                        '    <script src="out.js"></script>' \
                        '    <script src="runmain.js"></script>' \
                        '</body>' \
                        '</html>' > dist/index.html
                    fi
                  else
                    echo "No JSEXE directory found, creating placeholder..."
                    printf '%s\n' \
                      '<!DOCTYPE html>' \
                      '<html>' \
                      '<head>' \
                      '    <meta charset="utf-8">' \
                      '    <title>CalApp - Build Issue</title>' \
                      '</head>' \
                      '<body>' \
                      '    <h1>CalApp</h1>' \
                      '    <p>Build completed but JavaScript output not found.</p>' \
                      '    <p>Check the GitHub Actions logs for details.</p>' \
                      '</body>' \
                      '</html>' > dist/index.html
                  fi

                  # Copy CSS if it exists
                  if [ -f cal.css ]; then
                    cp cal.css dist/
                  fi

                  # List final contents
                  echo "=== Final dist/ contents ==="
                  ls -la dist/

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: miso-app-static
                  path: dist/

            - name: Deploy to GitHub Pages
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
