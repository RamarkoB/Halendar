name: Build and Deploy Miso App

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Nix
              uses: cachix/install-nix-action@v22
              with:
                  # Use nixos-23.11 which has more stable GHCJS
                  nix_path: nixpkgs=channel:nixos-23.11

            - name: Setup Cachix
              uses: cachix/cachix-action@v12
              with:
                  name: miso-haskell
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
                  skipPush: true

            - name: Create Nix build file
              run: |
                  cat > default.nix << 'NIXEND'
                  { pkgs ? import <nixpkgs> {} }:

                  let
                    # Use the standard GHCJS packages from nixpkgs
                    haskellPackages = pkgs.haskell.packages.ghcjs;
                    
                    # Override miso to use version 1.8.2.0 from Hackage
                    misoPackage = haskellPackages.callHackageDirect {
                      pkg = "miso";
                      ver = "1.8.2.0";
                      sha256 = "sha256-VhwrS2gOKyHLCFkAkswtC6KkYUl8hzxPGzEGIBpTT3U=";
                    } {};
                    
                    # Create the package set with our miso override
                    packageSet = haskellPackages.extend (self: super: {
                      miso = misoPackage;
                    });
                    
                  in packageSet.callCabal2nix "calApp" ./. {}
                  NIXEND

            - name: Build with Nix
              run: |
                  echo "Starting Nix build..."
                  timeout 30m nix-build --option sandbox false --max-jobs 1 --quiet 2>&1 | \
                  while IFS= read -r line; do
                    # Only show lines that indicate progress or errors
                    if echo "$line" | grep -E "(building|copying|patching|configuring|Setup:|error:|warning:|CallStack|fatal:|failed)" > /dev/null; then
                      echo "$line"
                    fi
                  done

                  BUILD_EXIT_CODE=${PIPESTATUS[0]}

                  if [ $BUILD_EXIT_CODE -eq 0 ]; then
                    echo "Build completed successfully!"
                  else
                    echo "Build failed with exit code $BUILD_EXIT_CODE"
                    exit 1
                  fi

            - name: Copy build artifacts
              run: |
                  echo "Looking for build output..."
                  mkdir -p dist

                  # Find JavaScript output
                  JSEXE_DIR=""
                  if [ -L "result" ]; then
                    JSEXE_DIR=$(find result -name "*.jsexe" -type d 2>/dev/null | head -1)
                  fi

                  if [ -n "$JSEXE_DIR" ] && [ -d "$JSEXE_DIR" ]; then
                    echo "Found JSEXE directory: $JSEXE_DIR"
                    
                    # Copy JavaScript files
                    if [ -f "$JSEXE_DIR/all.js" ]; then
                      cp "$JSEXE_DIR/all.js" dist/
                      cat > dist/index.html << 'EOF'
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="utf-8">
                      <title>CalApp</title>
                      <link rel="stylesheet" href="cal.css">
                  </head>
                  <body>
                      <div id="app"></div>
                      <script src="all.js"></script>
                      <script>h$main(h$mainZCZCMainzimain);</script>
                  </body>
                  </html>
                  EOF
                    else
                      # Copy individual files
                      cp "$JSEXE_DIR"/*.js dist/ || true
                      cat > dist/index.html << 'EOF'
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="utf-8">
                      <title>CalApp</title>
                      <link rel="stylesheet" href="cal.css">
                  </head>
                  <body>
                      <div id="app"></div>
                      <script src="rts.js"></script>
                      <script src="lib.js"></script>
                      <script src="out.js"></script>
                      <script src="runmain.js"></script>
                  </body>
                  </html>
                  EOF
                    fi
                  else
                    echo "No JSEXE directory found"
                    cat > dist/index.html << 'EOF'
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="utf-8">
                      <title>CalApp - Build Issue</title>
                  </head>
                  <body>
                      <h1>CalApp</h1>
                      <p>Build completed but JavaScript output not found.</p>
                      <p>Check the GitHub Actions logs for details.</p>
                  </body>
                  </html>
                  EOF
                  fi

                  # Copy CSS if it exists
                  if [ -f cal.css ]; then
                    cp cal.css dist/
                  fi

                  echo "Final dist/ contents:"
                  ls -la dist/

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: miso-app-static
                  path: dist/

            - name: Deploy to GitHub Pages
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
