name: Build and Deploy Miso App

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Nix
              uses: cachix/install-nix-action@v22
              with:
                  # Use a specific nixpkgs version that has working GHCJS
                  nix_path: nixpkgs=channel:nixos-22.11

            - name: Setup Cachix
              uses: cachix/cachix-action@v12
              with:
                  name: miso-haskell
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
                  skipPush: true

            - name: Create Nix build file
              run: |
                  cat > default.nix << 'NIXEND'
                  { pkgs ? import <nixpkgs> {} }:

                  let
                    # Use a specific working GHCJS version
                    haskellPackages = pkgs.haskell.packages.ghcjs;
                    
                    # Use miso from nixpkgs
                    
                  in haskellPackages.callCabal2nix "calApp" ./. {}
                  NIXEND

            - name: Build with Nix
              run: |
                  # Set timeout to 1 hour and show concise progress
                  echo "Starting Nix build (timeout: 60 minutes)..."
                  timeout 60m nix-build --cores 2 --max-jobs 2 --no-build-output --keep-going 2>&1 | \
                  grep -E "(building|copying|fetching)" | \
                  sed 's/^these .* will be built:/Building packages:/' | \
                  sed 's/^building '\''\/nix\/store\/[^-]*-/Building: /' | \
                  sed 's/\.drv'\''\.\.\.$//' | \
                  sed 's/^copying path.*from/Downloaded from cache:/' || \
                  echo "Build completed or timed out"

            - name: Copy build artifacts
              run: |
                  # Find the built JavaScript
                  if [ -d "result/bin" ]; then
                    JSEXE_DIR=$(find result/bin -name "*.jsexe" -type d | head -1)
                  else
                    JSEXE_DIR=$(find result -name "*.jsexe" -type d | head -1)
                  fi

                  echo "Found JSEXE directory: $JSEXE_DIR"

                  # Create output directory
                  mkdir -p dist

                  # Copy JavaScript files
                  if [ -f "$JSEXE_DIR/all.js" ]; then
                    cp "$JSEXE_DIR/all.js" dist/
                    # Create simple HTML using printf to avoid heredoc issues
                    printf '%s\n' \
                      '<!DOCTYPE html>' \
                      '<html>' \
                      '<head>' \
                      '    <meta charset="utf-8">' \
                      '    <title>CalApp</title>' \
                      '</head>' \
                      '<body>' \
                      '    <div id="app"></div>' \
                      '    <script src="all.js"></script>' \
                      '    <script>h$main(h$mainZCZCMainzimain);</script>' \
                      '</body>' \
                      '</html>' > dist/index.html
                  else
                    # Copy individual files
                    cp "$JSEXE_DIR"/*.js dist/ 2>/dev/null || true
                    # Create HTML for separate files using printf
                    printf '%s\n' \
                      '<!DOCTYPE html>' \
                      '<html>' \
                      '<head>' \
                      '    <meta charset="utf-8">' \
                      '    <title>CalApp</title>' \
                      '</head>' \
                      '<body>' \
                      '    <div id="app"></div>' \
                      '    <script src="rts.js"></script>' \
                      '    <script src="lib.js"></script>' \
                      '    <script src="out.js"></script>' \
                      '    <script src="runmain.js"></script>' \
                      '</body>' \
                      '</html>' > dist/index.html
                  fi

                  # Copy CSS if it exists
                  if [ -f cal.css ]; then
                    cp cal.css dist/
                  fi

                  # List contents
                  ls -la dist/

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: miso-app-static
                  path: dist/

            - name: Deploy to GitHub Pages
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
