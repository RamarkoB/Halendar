name: Build and Deploy Miso App

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build:
        runs-on: ubuntu-20.04

        steps:
            - uses: actions/checkout@v4

            - name: Setup Haskell
              uses: haskell/actions/setup@v2
              with:
                  ghc-version: '8.10.7'
                  cabal-version: '3.6'
                  stack-version: '2.7.5'

            - name: Install Node.js (for GHCJS)
              uses: actions/setup-node@v4
              with:
                  node-version: '16'

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.stack
                      ~/.cabal
                      .stack-work
                  key: ${{ runner.os }}-haskell-lts14-${{ hashFiles('**/*.cabal', 'stack.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-haskell-lts14-

            - name: Install GHCJS via Stack
              run: |
                  # Create stack.yaml with older resolver that supports GHCJS
                  cat > stack.yaml << 'STACKEND'
                  resolver: lts-14.27
                  packages:
                  - .
                  extra-deps:
                  - miso-1.7.1.0
                  compiler: ghcjs-8.6.0.1
                  compiler-check: match-exact
                  allow-newer: true
                  STACKEND

                  # Setup Stack and GHCJS
                  stack setup --install-ghc
                  stack exec -- ghcjs-boot --dev

            - name: Build with GHCJS
              run: |
                  stack build

            - name: Find and copy compiled files
              run: |
                  # Find the .jsexe directory (Stack output location)
                  JSEXE_DIR=$(find .stack-work -name "*.jsexe" -type d | head -1)
                  echo "Found JSEXE directory: $JSEXE_DIR"

                  # Create output directory
                  mkdir -p dist

                  # Copy JavaScript files and create appropriate HTML
                  if [ -f "$JSEXE_DIR/all.js" ]; then
                    cp "$JSEXE_DIR/all.js" dist/
                    # Create index.html for all.js version
                    cat > dist/index.html << 'HTMLEND'
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="utf-8">
                      <title>CalApp</title>
                      <link rel="stylesheet" type="text/css" href="cal.css">
                  </head>
                  <body>
                      <script language="javascript" src="all.js"></script>
                      <script language="javascript">
                        h$main(h$mainZCZCMainzimain);
                      </script>
                  </body>
                  </html>
                  HTMLEND
                  else
                    # Copy individual files
                    cp "$JSEXE_DIR"/{rts.js,lib.js,out.js,runmain.js} dist/ 2>/dev/null || true
                    # Create index.html for separate files version
                    cat > dist/index.html << 'HTMLEND2'
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="utf-8">
                      <title>CalApp</title>
                      <link rel="stylesheet" type="text/css" href="cal.css">
                  </head>
                  <body>
                      <script language="javascript" src="rts.js"></script>
                      <script language="javascript" src="lib.js"></script>
                      <script language="javascript" src="out.js"></script>
                      <script language="javascript" src="runmain.js" defer></script>
                  </body>
                  </html>
                  HTMLEND2
                  fi

                  # Copy CSS if it exists
                  if [ -f cal.css ]; then
                    cp cal.css dist/
                  fi

                  # List what we created
                  ls -la dist/

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: miso-app-static
                  path: dist/

            - name: Deploy to GitHub Pages
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
